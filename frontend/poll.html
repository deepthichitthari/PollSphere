<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Vote Now</h1>
</header>

<div class="container">

    <h2>Which Programming Language Do You Like?</h2>

    <form>

        <input type="radio" name="vote" id="java">
        <label for="java">Java</label><br><br>

        <input type="radio" name="vote" id="python">
        <label for="python">Python</label><br><br>

        <input type="radio" name="vote" id="cpp">
        <label for="cpp">C++</label><br><br>

        <input type="radio" name="vote" id="javascript">
        <label for="javascript">JavaScript</label><br><br>

        <button type="submit">Submit Vote</button>

    </form>

    <br>

    <a href="dashboard.html">
        <button>Back to Dashboard</button>
    </a>

</div>

<script src="js/script.js"></script>

</body>
</html>
